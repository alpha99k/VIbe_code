<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris iO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-title">
        <h1><span>T</span><span>E</span><span>T</span><span>R</span><span>I</span><span>S</span></h1>
    </div>

    <div class="game-container">
        <!-- 왼쪽 패널: 게임 정보 및 조작법 -->
        <div class="side-panel left">
            <div class="info-row">
                <div class="stage-box">
                    <p>STAGE</p>
                    <span id="stage">1</span>
                </div>
                <div class="time-box">
                    <p>TIME</p>
                    <span id="timer">90</span>
                </div>
            </div>
            <div class="score-box">
                <p>SCORE</p>
                <span id="score">0</span>
            </div>
            <div class="controls">
                <p><strong>CONTROLS</strong></p>
                <p>← → : LEFT MOVE</p>
                <p>↑ : ROTATE</p>
                <p>↓ : DOWN</p>
                <p>Space : DEEP DOWN</p>
            </div>
        </div>

        <!-- 중앙: 메인 게임 화면 -->
        <div class="canvas-container">
            <canvas id="tetris" width="240" height="400"></canvas>
            <button id="start-btn">START GAME</button>
        </div>

        <!-- 오른쪽 패널: 다음 블록 및 랭킹 -->
        <div class="side-panel right">
            <div class="next-box">
                <p>NEXT</p>
                <canvas id="next" width="100" height="100"></canvas>
            </div>
            <div class="ranking-box">
                <p>TOP 5 RANKING 🏆</p>
                <ul id="ranking-list"></ul>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <input type="text" id="player-name" placeholder="Enter Name" maxlength="10">
            <button id="save-score-btn">SAVE & RESTART</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
